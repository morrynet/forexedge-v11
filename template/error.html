<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Login — Forex SaaS</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: #0d0f14;
    font-family: 'Segoe UI', system-ui, sans-serif;
  }
  .card {
    background: #161b27; border: 1px solid #2a3045; border-radius: 12px;
    padding: 2.5rem 2rem; width: 360px; box-shadow: 0 20px 60px rgba(0,0,0,.5);
  }
  h1 { color: #e2e8f0; font-size: 1.4rem; margin-bottom: .3rem; }
  p  { color: #64748b; font-size: .85rem; margin-bottom: 1.8rem; }
  label { display: block; color: #94a3b8; font-size: .78rem; margin-bottom: .35rem; letter-spacing: .05em; text-transform: uppercase; }
  input {
    width: 100%; padding: .65rem .85rem; border-radius: 8px;
    border: 1px solid #2a3045; background: #0d0f14; color: #e2e8f0;
    font-size: .95rem; margin-bottom: 1.1rem; outline: none;
    transition: border-color .2s;
  }
  input:focus { border-color: #3b82f6; }
  .error { color: #f87171; font-size: .82rem; margin-bottom: 1rem; }
  button {
    width: 100%; padding: .72rem; border-radius: 8px; border: none;
    background: #2563eb; color: #fff; font-size: 1rem; font-weight: 600;
    cursor: pointer; transition: background .2s;
  }
  button:hover { background: #1d4ed8; }
</style>
</head>
<body>
<div class="card">
  <h1>🔐 Admin Login</h1>
  <p>Forex SaaS Control Panel</p>
  {% if error %}<div class="error">⚠️ {{ error }}</div>{% endif %}
  <form method="POST">
    <label>Username</label>
    <input type="text" name="username" autocomplete="username" required>
    <label>Password</label>
    <input type="password" name="password" autocomplete="current-password" required>
    <button type="submit">Sign In</button>
  </form>
</div>
</body>
</html>
