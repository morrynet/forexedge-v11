services:
  # ── Flask API ──────────────────────────────────────────────────────────────
  - type: web
    name: forex-saas-api
    runtime: python
    buildCommand: "pip install -r requirements.txt && python migrations.py"
    startCommand: "gunicorn app:app --workers 4 --worker-class gthread --threads 2 --bind 0.0.0.0:$PORT --timeout 60 --access-logfile - --error-logfile -"
    healthCheckPath: /health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: BOT_API_KEY
        generateValue: true
      - key: USERBOT_API_KEY
        generateValue: true
      - key: CRON_KEY
        generateValue: true
      - key: ADMIN_USER
        sync: false
      - key: ADMIN_PASS_HASH
        sync: false
      - key: STORE_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: forex-saas-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: forex-saas-redis
          property: connectionString
      - key: PAYPAL_BUTTON_URL
        sync: false
      - key: PAYPAL_RECEIVER_EMAIL
        sync: false
      - key: PAYPAL_SANDBOX
        value: "false"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ADMIN_EMAIL
        value: "morrynet@gmail.com"
      - key: SMTP_HOST
        value: "smtp.gmail.com"
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: HTTPS
        value: "true"
      - key: REFERRAL_COMMISSION_USD
        value: "5.00"

  # ── Customer Service Bot ───────────────────────────────────────────────────
  - type: worker
    name: forex-saas-bot
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python bot.py"
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: BOT_API_KEY
        fromService:
          type: web
          name: forex-saas-api
          envVarKey: BOT_API_KEY
      - key: STORE_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ADMIN_TELEGRAM_IDS
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: forex-saas-redis
          property: connectionString

  # ── Marketing Userbot ──────────────────────────────────────────────────────
  - type: worker
    name: forex-saas-userbot
    runtime: python
    plan: starter           # needs persistent disk
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python userbot.py"
    disk:
      name: userbot-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: TELEGRAM_API_ID
        sync: false
      - key: TELEGRAM_API_HASH
        sync: false
      - key: TELEGRAM_PHONE
        sync: false
      - key: USERBOT_API_KEY
        fromService:
          type: web
          name: forex-saas-api
          envVarKey: USERBOT_API_KEY
      - key: STORE_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SESSION_FILE
        value: "/data/userbot_session"
      - key: STATE_DB
        value: "/data/userbot_state.db"
      - key: DM_PER_DAY_MAX
        value: "10"
      - key: DM_DELAY_MIN
        value: "90"
      - key: DM_DELAY_MAX
        value: "240"

databases:
  - name: forex-saas-db
    plan: free

# Note: Add a Redis instance manually in Render dashboard
# (Render Redis is available on paid plans)
